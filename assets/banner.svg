<svg viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="termi — your Terminal Friend">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8b84a"/>
      <stop offset="1" stop-color="#f5d67b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ad1c8"/>
      <stop offset="1" stop-color="#7be8b8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- terminal window motif: the friend lives inside the prompt -->
  <g transform="translate(74,66)">
    <rect x="0" y="0" width="340" height="208" rx="14" fill="#0d1322" stroke="#2a3a5a" stroke-width="2"/>
    <rect x="0" y="0" width="340" height="34" rx="14" fill="#141d33"/>
    <rect x="0" y="20" width="340" height="14" fill="#141d33"/>
    <circle cx="24" cy="17" r="6" fill="#e0645c"/>
    <circle cx="46" cy="17" r="6" fill="#e8b84a"/>
    <circle cx="68" cy="17" r="6" fill="#5fbf6e"/>
    <text x="20" y="72" font-family="Menlo, Consolas, monospace" font-size="19" fill="#7be8b8">$ termi doctor</text>
    <text x="20" y="104" font-family="Menlo, Consolas, monospace" font-size="19" fill="#8fa4c8">gti status</text>
    <text x="20" y="136" font-family="Menlo, Consolas, monospace" font-size="17" fill="#f5d67b">termi &#128155; did you mean</text>
    <text x="20" y="162" font-family="Menlo, Consolas, monospace" font-size="17" fill="#7be8b8">git? (press &#8629;)</text>
    <!-- heart cursor -->
    <path d="M262 178 c-7-8-20-6-20 5 c0 8 12 14 20 20 c8-6 20-12 20-20 c0-11-13-13-20-5 z" fill="url(#gold)"/>
  </g>

  <g transform="translate(490,0)">
    <text x="0" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="bold" fill="url(#gold)">termi</text>
    <text x="4" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#c9d6ee">your Terminal Friend</text>
    <text x="4" y="226" font-family="Verdana, Geneva, sans-serif" font-size="16" fill="#8fa4c8">doctor · packs · editor keys · typo recovery · profiles · any shell · any terminal · any AI harness</text>
    <rect x="4" y="248" width="700" height="2" fill="url(#teal)" opacity="0.7"/>
    <text x="4" y="286" font-family="Verdana, Geneva, sans-serif" font-size="17" letter-spacing="3" fill="#f5d67b">5 SHELLS &#183; 8 PACKS &#183; 87 TESTS &#183; EVERY &#9679; IS A PASSING TEST</text>
  </g>
</svg>
